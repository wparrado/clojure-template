name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: 'latest'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-

      # ── Quality gates ────────────────────────────────────────────────────────

      - name: Format check
        run: clj -M:format-check

      - name: Lint (clj-kondo)
        run: clj -M:lint

      # ── Tests ────────────────────────────────────────────────────────────────

      - name: Unit tests
        run: clj -M:test --focus :unit

      - name: Integration tests
        run: clj -M:test --focus :integration

      - name: Architecture tests
        run: clj -M:test --focus :architecture

      # ── Coverage ─────────────────────────────────────────────────────────────

      - name: Coverage (min 90%)
        run: clj -M:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/coverage/

      # ── Security ─────────────────────────────────────────────────────────────

      - name: CVE scan (OWASP NVD)
        run: clj -X:nvd :classpath "\"$(clj -Spath)\"" :config-filename '"nvd-config.edn"'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
